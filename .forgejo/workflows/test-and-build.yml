name: test-and-build

on:
  push: {}

permissions:
  contents: write
  issues: write

jobs:
  test-and-build:
    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/luzifer-docker/action-env:master@sha256:39f8d94d52d838a5e079515c60f493cb753fcb83ce610e40c5988d1fa5008494
      env:
        CGO_ENABLED: 0
        GOPATH: /go

    runs-on: forgejo

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Marking workdir safe
        run: git config --global --add safe.directory /__w/korvike/korvike

      - name: 'Lint and test code'
        run: |
          make test trivy

      - name: Do a quick local compile
        run: |
          go build .
